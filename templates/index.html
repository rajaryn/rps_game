<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1v1 Rock Paper Scissors</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 600px;
            transition: all 0.3s ease;
        }

        h1 { margin-bottom: 0.5rem; font-weight: 800; letter-spacing: 1px; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }

        /* --- Screen Toggles --- */
        .screen { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .screen.active { display: block; opacity: 1; }
        .hidden { display: none !important; }

        /* --- Lobby UI --- */
        .input-group { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
        
        input, select {
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { border-color: var(--accent); }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:hover:not(:disabled) { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Gameplay UI --- */
        #scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #334155;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            font-weight: 800;
        }
        .score { color: var(--accent); font-size: 1.5rem; }
        #main-timer { color: var(--danger); font-size: 1.5rem; }

        #status-bar {
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .timer-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary-bg);
            border: 4px solid var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 2rem auto;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
        }
        .timer-warning { border-color: var(--danger); color: var(--danger); }

        .weapons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .weapon-btn {
            background: #334155;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 20px;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .weapon-btn:hover:not(:disabled) {
            transform: scale(1.1) rotate(5deg);
            background: #475569;
            border-color: var(--accent);
        }
        .weapon-btn.selected {
            background: var(--accent);
            border-color: white;
            transform: scale(1.1);
        }
        .weapon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 10px;
            background: var(--primary-bg);
            display: none;
        }
        .result-text { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .matchup { color: var(--text-muted); font-size: 1rem; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="lobby-screen" class="screen active">
            <h1>RPS Showdown</h1>
            <p class="subtitle">Create or join a room to play 1v1</p>
            
            <div class="input-group">
                <input type="text" id="room-input" placeholder="Enter Room Code (e.g., room42)" autocomplete="off">
                
                <select id="game-mode">
                    <option value="rounds_3">First to 3 Wins</option>
                    <option value="rounds_5">First to 5 Wins</option>
                    <option value="time_60">60 Seconds Free Play</option>
                    <option value="time_120">120 Seconds Free Play</option>
                </select>

                <button class="btn" onclick="joinRoom()">Enter Arena</button>
            </div>
            <p id="lobby-msg" style="color: var(--text-muted); font-size: 0.9rem;"></p>
        </div>

        <div id="game-screen" class="screen">
            
            <div id="scoreboard">
                <div>P1: <span id="score-p1" class="score">0</span></div>
                <div id="main-timer" class="hidden">60s</div>
                <div>P2: <span id="score-p2" class="score">0</span></div>
            </div>

            <div id="status-bar">Waiting for opponent...</div>
            
            <div id="timer" class="timer-circle">10</div>

            <div class="weapons">
                <button class="weapon-btn" id="btn-rock" onclick="makeChoice('rock')">🪨</button>
                <button class="weapon-btn" id="btn-paper" onclick="makeChoice('paper')">📄</button>
                <button class="weapon-btn" id="btn-scissors" onclick="makeChoice('scissors')">✂️</button>
            </div>

            <div id="result-box">
                <div class="result-text" id="result-winner"></div>
                <div class="matchup" id="result-matchup"></div>
                <button class="btn" id="next-btn" style="margin-top: 15px; padding: 10px 20px; display: none;" onclick="location.reload()">Return to Lobby</button>
            </div>
        </div>

    </div>

    <script>
        const socket = io();
        let currentRoom = '';
        let roundTimerInterval;
        let mainTimerInterval;
        let choiceMade = false;
        let gameMode = '';
        let isGameOver = false;

        const emojiMap = { 'rock': '🪨', 'paper': '📄', 'scissors': '✂️' };

        // --- Socket Listeners ---
        socket.on('status', function(data) {
            if (document.getElementById('lobby-screen').classList.contains('active')) {
                document.getElementById('lobby-msg').innerText = data.message;
            } else {
                document.getElementById('status-bar').innerText = data.message;
            }
        });

        socket.on('error', function(data) {
            alert(data.message);
            document.getElementById('lobby-msg').innerText = '';
        });

        socket.on('start_match', function(data) {
            document.getElementById('lobby-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            gameMode = data.mode;
            if (gameMode === 'time') {
                startMainTimer(data.limit);
            }
            
            startNewRound();
        });

        socket.on('start_round', function(data) {
            startNewRound();
        });

        socket.on('round_result', function(data) {
            clearInterval(roundTimerInterval);
            document.getElementById('timer').innerText = '0';
            
            // Update Scores
            document.getElementById('score-p1').innerText = data.scores[0];
            document.getElementById('score-p2').innerText = data.scores[1] || 0;

            // Show Results
            document.getElementById('result-winner').innerText = data.result;
            document.getElementById('result-matchup').innerText = 
                `P1: ${emojiMap[data.p1_choice]} vs P2: ${emojiMap[data.p2_choice]}`;
            
            document.getElementById('result-box').style.display = 'block';
            document.querySelectorAll('.weapon-btn').forEach(b => b.disabled = true);

            // Handle Game Over or Auto-Next Round
            if (data.game_over) {
                endGame();
            } else {
                document.getElementById('status-bar').innerText = "Next round starting in 3 seconds...";
                document.getElementById('next-btn').style.display = 'none'; // Ensure button stays hidden
            }
        });

        // --- Game Actions ---
        function joinRoom() {
            const room = document.getElementById('room-input').value.trim();
            const settings = document.getElementById('game-mode').value;
            if (room) {
                currentRoom = room;
                socket.emit('join_room', { room: room, settings: settings });
                document.getElementById('lobby-msg').innerText = "Connecting...";
            }
        }

        function startNewRound() {
            if (isGameOver) return;
            choiceMade = false;
            document.getElementById('result-box').style.display = 'none';
            document.querySelectorAll('.weapon-btn').forEach(b => {
                b.disabled = false;
                b.classList.remove('selected');
            });
            document.getElementById('status-bar').innerText = "Pick your weapon!";
            startRoundTimer(10);
        }

        function makeChoice(choice) {
            if (choiceMade || isGameOver) return;
            
            choiceMade = true;
            document.querySelectorAll('.weapon-btn').forEach(b => b.disabled = true);
            document.getElementById(`btn-${choice}`).classList.add('selected');
            document.getElementById(`btn-${choice}`).disabled = false; // Keep selected visible
            
            socket.emit('make_choice', { room: currentRoom, choice: choice });
            document.getElementById('status-bar').innerText = `Locked in ${emojiMap[choice]}...`;
        }

        // --- Timers ---
        function startRoundTimer(seconds) {
            let timeLeft = seconds;
            const timerEl = document.getElementById('timer');
            timerEl.innerText = timeLeft;
            timerEl.classList.remove('timer-warning');
            
            roundTimerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                
                if (timeLeft <= 3) timerEl.classList.add('timer-warning');
                
                if (timeLeft <= 0) {
                    clearInterval(roundTimerInterval);
                    if (!choiceMade) {
                        const options = ['rock', 'paper', 'scissors'];
                        makeChoice(options[Math.floor(Math.random() * options.length)]);
                    }
                }
            }, 1000);
        }

        function startMainTimer(seconds) {
            let timeLeft = seconds;
            const mainTimerEl = document.getElementById('main-timer');
            mainTimerEl.classList.remove('hidden');
            mainTimerEl.innerText = timeLeft + 's';
            
            mainTimerInterval = setInterval(() => {
                timeLeft--;
                mainTimerEl.innerText = timeLeft + 's';
                
                if (timeLeft <= 0) {
                    clearInterval(mainTimerInterval);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isGameOver = true;
            clearInterval(roundTimerInterval);
            document.getElementById('status-bar').innerText = "MATCH OVER";
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = "Return to Lobby";
            nextBtn.style.display = 'inline-block'; // Reveal the button
            nextBtn.disabled = false;
            nextBtn.setAttribute('onclick', 'location.reload()'); // Refreshes page to start over
            document.getElementById('result-box').style.display = 'block';
        }
    </script>
</body>
</html>
