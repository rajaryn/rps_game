<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1v1 Rock Paper Scissors</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.2s ease;
        }

        .container {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 600px;
            transition: all 0.3s ease;
        }

        h1 { margin-bottom: 0.5rem; font-weight: 800; letter-spacing: 1px; }
        .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }

        .screen { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .screen.active { display: block; opacity: 1; }
        .hidden { display: none !important; }

        .input-group { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
        
        input, select {
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { border-color: var(--accent); }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:hover:not(:disabled) { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #334155;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            font-weight: 800;
        }
        .score { color: var(--accent); font-size: 1.5rem; }
        #main-timer { color: var(--danger); font-size: 1.5rem; }

        #status-bar {
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .timer-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary-bg);
            border: 4px solid var(--accent);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 2rem auto;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
        }
        .timer-warning { border-color: var(--danger); color: var(--danger); }

        .weapons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .weapon-btn {
            background: #334155;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 20px;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .weapon-btn:hover:not(:disabled) {
            transform: scale(1.1) rotate(5deg);
            background: #475569;
            border-color: var(--accent);
        }
        .weapon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- VFX CSS Classes --- */
        @keyframes selectPulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.8); }
            70% { box-shadow: 0 0 0 25px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        
        .weapon-selected-vfx {
            background: var(--accent) !important;
            border-color: white !important;
            opacity: 1 !important;
            transform: scale(1.1);
            animation: selectPulse 0.6s ease-out;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        
        .shake-vfx { animation: shake 0.5s; }
        .flash-red-vfx { background-color: #450a0a !important; }

        #result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 10px;
            background: var(--primary-bg);
            display: none;
        }
        .result-text { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .matchup { color: var(--text-muted); font-size: 1rem; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        
        <div id="lobby-screen" class="screen active">
            <h1>RPS Showdown</h1>
            <p class="subtitle">Create or join a room to play 1v1</p>
            
            <div class="input-group">
                <input type="text" id="name-input" placeholder="Enter Your Name" autocomplete="off" maxlength="15">
                <input type="text" id="room-input" placeholder="Enter Room Code (e.g., room42)" autocomplete="off">
                
                <select id="game-mode">
                    <option value="rounds_3">First to 3 Wins</option>
                    <option value="rounds_5">First to 5 Wins</option>
                    <option value="time_60">60 Seconds Free Play</option>
                    <option value="time_120">120 Seconds Free Play</option>
                </select>

                <button class="btn" onclick="joinRoom()">Enter Arena</button>
            </div>
            <p id="lobby-msg" style="color: var(--text-muted); font-size: 0.9rem;"></p>
        </div>

        <div id="game-screen" class="screen">
            
            <div id="scoreboard">
                <div><span id="name-p1">P1</span>: <span id="score-p1" class="score">0</span></div>
                <div id="main-timer" class="hidden">60s</div>
                <div><span id="name-p2">P2</span>: <span id="score-p2" class="score">0</span></div>
            </div>

            <div id="status-bar">Waiting for opponent...</div>
            
            <div id="timer" class="timer-circle">10</div>

            <div class="weapons">
                <button class="weapon-btn" id="btn-rock" onclick="makeChoice('rock')">🪨</button>
                <button class="weapon-btn" id="btn-paper" onclick="makeChoice('paper')">📄</button>
                <button class="weapon-btn" id="btn-scissors" onclick="makeChoice('scissors')">✂️</button>
            </div>

            <div id="result-box">
                <div class="result-text" id="result-winner"></div>
                <div class="matchup" id="result-matchup"></div>
                <button class="btn" id="next-btn" style="margin-top: 15px; padding: 10px 20px; display: none;" onclick="location.reload()">Return to Lobby</button>
            </div>
        </div>

    </div>

    <script>
        const socket = io();
        let currentRoom = '';
        let roundTimerInterval;
        let mainTimerInterval;
        let choiceMade = false;
        let gameMode = '';
        let isGameOver = false;

        const emojiMap = { 'rock': '🪨', 'paper': '📄', 'scissors': '✂️' };

        // --- NEW: Audio SFX Setup ---
        const sfx = {
            select: new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=button-124476.mp3'),
            win: new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_bb630cc098.mp3?filename=success-1-6297.mp3'),
            lose: new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3?filename=negative_beeps-6008.mp3'),
            tie: new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_793b821422.mp3?filename=pop-94319.mp3')
        };

        // Helper function to play sound safely
        function playSound(type) {
            sfx[type].currentTime = 0; // Reset sound to start if played rapidly
            sfx[type].play().catch(e => console.log("Audio play prevented by browser:", e));
        }

        socket.on('status', function(data) {
            if (document.getElementById('lobby-screen').classList.contains('active')) {
                document.getElementById('lobby-msg').innerText = data.message;
            } else {
                document.getElementById('status-bar').innerText = data.message;
            }
        });

        socket.on('error', function(data) {
            alert(data.message);
            document.getElementById('lobby-msg').innerText = '';
        });

        socket.on('start_match', function(data) {
            document.getElementById('lobby-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            document.getElementById('name-p1').innerText = data.names[0];
            document.getElementById('name-p2').innerText = data.names[1];

            gameMode = data.mode;
            if (gameMode === 'time') {
                startMainTimer(data.limit);
            }
            
            startNewRound();
        });

        socket.on('start_round', function(data) {
            startNewRound();
        });

        socket.on('round_result', function(data) {
            clearInterval(roundTimerInterval);
            document.getElementById('timer').innerText = '0';
            
            document.getElementById('score-p1').innerText = data.scores[0];
            document.getElementById('score-p2').innerText = data.scores[1] || 0;

            document.getElementById('result-winner').innerText = data.result;
            document.getElementById('result-matchup').innerText = 
                `${data.names[0]}: ${emojiMap[data.p1_choice]}  vs  ${data.names[1]}: ${emojiMap[data.p2_choice]}`;
            
            document.getElementById('result-box').style.display = 'block';
            document.querySelectorAll('.weapon-btn').forEach(b => b.disabled = true);

            // --- Trigger SFX & VFX ---
            if (data.winner_sid === socket.id) {
                playSound('win');
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#3b82f6', '#10b981', '#ffffff']
                });
            } else if (data.winner_sid !== 'tie') {
                playSound('lose');
                document.body.classList.add('flash-red-vfx');
                document.getElementById('main-container').classList.add('shake-vfx');
                
                setTimeout(() => {
                    document.body.classList.remove('flash-red-vfx');
                    document.getElementById('main-container').classList.remove('shake-vfx');
                }, 500);
            } else {
                playSound('tie');
            }

            if (data.game_over) {
                endGame();
            } else {
                document.getElementById('status-bar').innerText = "Next round starting in 3 seconds...";
                document.getElementById('next-btn').style.display = 'none';
            }
        });

        function joinRoom() {
            const name = document.getElementById('name-input').value.trim() || 'Player';
            const room = document.getElementById('room-input').value.trim();
            const settings = document.getElementById('game-mode').value;
            
            if (room) {
                currentRoom = room;
                socket.emit('join_room', { room: room, name: name, settings: settings });
                document.getElementById('lobby-msg').innerText = "Connecting...";
            }
        }

        function startNewRound() {
            if (isGameOver) return;
            choiceMade = false;
            document.getElementById('result-box').style.display = 'none';
            
            document.querySelectorAll('.weapon-btn').forEach(b => {
                b.disabled = false;
                b.classList.remove('weapon-selected-vfx');
            });
            
            document.getElementById('status-bar').innerText = "Pick your weapon!";
            startRoundTimer(10);
        }

        function makeChoice(choice) {
            if (choiceMade || isGameOver) return;
            
            choiceMade = true;
            document.querySelectorAll('.weapon-btn').forEach(b => b.disabled = true);
            
            playSound('select'); // Play lock-in sound
            document.getElementById(`btn-${choice}`).classList.add('weapon-selected-vfx');
            
            socket.emit('make_choice', { room: currentRoom, choice: choice });
            document.getElementById('status-bar').innerText = `Locked in ${emojiMap[choice]}...`;
        }

        function startRoundTimer(seconds) {
            let timeLeft = seconds;
            const timerEl = document.getElementById('timer');
            timerEl.innerText = timeLeft;
            timerEl.classList.remove('timer-warning');
            
            roundTimerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                
                if (timeLeft <= 3) timerEl.classList.add('timer-warning');
                
                if (timeLeft <= 0) {
                    clearInterval(roundTimerInterval);
                    if (!choiceMade) {
                        const options = ['rock', 'paper', 'scissors'];
                        makeChoice(options[Math.floor(Math.random() * options.length)]);
                    }
                }
            }, 1000);
        }

        function startMainTimer(seconds) {
            let timeLeft = seconds;
            const mainTimerEl = document.getElementById('main-timer');
            mainTimerEl.classList.remove('hidden');
            mainTimerEl.innerText = timeLeft + 's';
            
            mainTimerInterval = setInterval(() => {
                timeLeft--;
                mainTimerEl.innerText = timeLeft + 's';
                
                if (timeLeft <= 0) {
                    clearInterval(mainTimerInterval);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isGameOver = true;
            clearInterval(roundTimerInterval);
            document.getElementById('status-bar').innerText = "MATCH OVER";
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = "Return to Lobby";
            nextBtn.style.display = 'inline-block';
            nextBtn.disabled = false;
            nextBtn.setAttribute('onclick', 'location.reload()');
            document.getElementById('result-box').style.display = 'block';
        }
    </script>
</body>
</html>
